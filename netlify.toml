[build]
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Content-Security-Policy is intentionally NOT set here. netlify.toml
# [[headers]] has no supported per-context variant — [context.X] blocks can
# only override command/publish/functions/environment, never headers — so a
# static script-src here would apply identically to `netlify dev` and to
# production, breaking Next.js's dev-mode eval()-based HMR/Fast Refresh. It
# also can't carry a per-request nonce, which a strict (no unsafe-inline)
# script-src needs for Next's own hydration scripts to run. The CSP lives
# in middleware.ts instead, which generates a fresh nonce per request and
# skips setting the header at all outside production — and still applies
# correctly once deployed, since @netlify/plugin-nextjs runs Next
# middleware as-is (as a Netlify Edge Function).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Deploy previews and branch deploys use the same build settings by default.
# Set environment-specific vars (SUPABASE keys, WhatsApp tokens) per context
# in the Netlify UI: Site settings > Environment variables > scope per context.
